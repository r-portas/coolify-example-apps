services:
  host-network:
    image: python:3.12-alpine
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./public:/srv/public:ro
    command: python -m http.server 8888 --directory /srv/public
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
